# Alembic configuration file
# ──────────────────────────
# Reference: https://alembic.sqlalchemy.org/en/latest/tutorial.html
#
# The DATABASE_URL is injected from shared/database/config.py (via env.py)
# so you don't need to set sqlalchemy.url here.

[alembic]
script_location = migrations
prepend_sys_path = .
version_path_separator = os

# Placeholder — overridden by env.py using DATABASE_URL from .env
sqlalchemy.url = postgresql+asyncpg://placeholder

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
